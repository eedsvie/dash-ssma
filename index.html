<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação de Dashboards SSMA - Setor 8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            950: '#070D22',
                            900: '#0b1633', /* Deep Blue Body */
                            800: '#142551', /* Cards */
                            700: '#1d3674', /* Borders / hover */
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1633; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; opacity: 0; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1633; }
        ::-webkit-scrollbar-thumb { background: #1d3674; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #254694; }

        .glass-card {
            background: rgba(20, 37, 81, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(29, 54, 116, 0.5);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen selection:bg-blue-500/30">

    <div class="max-w-[1200px] mx-auto px-6 py-16">
        
        <!-- Header Centralizado -->
        <header class="mb-20 text-center animate-fade-in-up">
            <div class="inline-block px-4 py-1.5 mb-6 text-xs font-bold tracking-widest uppercase rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20">
                Portal Administrativo
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-100 via-blue-300 to-blue-500 mb-6 tracking-tight">
                Apresentação de Dashboards <br class="hidden md:block"> SSMA - Setor 8
            </h1>
        </header>

        <!-- Grade de Dashboards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Card 1: NR-06 NR-18 -->
            <a href="nr18.html" target="_blank" class="group relative animate-fade-in-up" style="animation-delay: 100ms;">
                <div class="glass-card card-hover h-full rounded-3xl p-8 transition-all duration-300 flex flex-col justify-between overflow-hidden">
                    <div class="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                        <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    </div>
                    <div>
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center mb-8 shadow-lg group-hover:scale-110 transition-transform duration-300">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-6">NR-06 & NR-18</h3>
                    </div>
                    <div class="flex items-center text-blue-400 font-bold text-sm tracking-wide">
                        ABRIR DASHBOARD 
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                </div>
            </a>

            <!-- Card 2: Brigada -->
            <a href="brigada.html" target="_blank" class="group relative animate-fade-in-up" style="animation-delay: 200ms;">
                <div class="glass-card card-hover h-full rounded-3xl p-8 transition-all duration-300 flex flex-col justify-between overflow-hidden">
                    <div class="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                        <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div>
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-rose-500 to-rose-700 flex items-center justify-center mb-8 shadow-lg group-hover:scale-110 transition-transform duration-300">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.99 7.99 0 0120 13a7.98 7.98 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14l-2.121 2.121z"></path></svg>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-6">Brigada 2026</h3>
                    </div>
                    <div class="flex items-center text-rose-400 font-bold text-sm tracking-wide">
                        ABRIR DASHBOARD 
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                </div>
            </a>

            <!-- Card 3: Treinamento Irmãs -->
            <a href="irmas.html" target="_blank" class="group relative animate-fade-in-up" style="animation-delay: 300ms;">
                <div class="glass-card card-hover h-full rounded-3xl p-8 transition-all duration-300 flex flex-col justify-between overflow-hidden">
                    <div class="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                        <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <div>
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center mb-8 shadow-lg group-hover:scale-110 transition-transform duration-300">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-6">Inscrição Irmãs</h3>
                    </div>
                    <div class="flex items-center text-purple-400 font-bold text-sm tracking-wide">
                        ABRIR DASHBOARD 
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                </div>
            </a>

        </div>

        <!-- Footer -->
        <footer class="mt-20 pt-8 border-t border-brand-700/50 text-center animate-fade-in-up" style="animation-delay: 400ms;">
            <p class="text-slate-500 text-sm">
                &copy; 2026 SSMA - Setor 8 Leonidas Moreira. Todos os direitos reservados.
            </p>
        </footer>

    </div>

</body>
</html>
